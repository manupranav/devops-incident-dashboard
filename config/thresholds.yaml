# config/thresholds.yaml
# Alert threshold configuration for devops-incident-dashboard
#
# Values are percentages (0-100).
# WARNING fires first; CRITICAL fires when things are actually on fire.
#
# TODO: Add per-host overrides (e.g., db servers have higher disk thresholds)
# TODO: Add thresholds for network I/O (bytes_in, bytes_out)
# TODO: Validate that critical > warning at startup

thresholds:
  # CPU utilization
  cpu_warning: 60        # Warn at 75% — investigate if sustained
  cpu_critical: 90       # Page on-call at 90% — immediate action needed

  # Memory utilization
  memory_warning: 80     # Warn at 80%
  memory_critical: 90    # Critical at 90% — risk of OOM kill

  # Disk utilization (root filesystem by default)
  disk_warning: 75       # Warn at 75% — schedule cleanup
  disk_critical: 90      # Critical at 90% — logs may stop writing
  network_warning_mbps: 80
  network_critical_mbps: 950
# Polling settings
polling:
  interval_seconds: 10   # How often monitor.py polls metrics
  # TODO: interval should be configurable per environment (prod vs dev)

# Notification settings
notifications:
  slack_channel: "#ops-alerts"
  pagerduty_service: "devops-on-call"
  # TODO: pull slack_webhook_url and pagerduty_key from .env, not hardcoded here
  alert_cooldown_minutes: 5  # Don't repeat same alert within this window (NOT IMPLEMENTED YET)

# Environment label (used in alert messages)
environment: production   # TODO: Set via ENV var so this file works across envs
